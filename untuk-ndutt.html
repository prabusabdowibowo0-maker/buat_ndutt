<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Pertunjukan Spesial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Dancing+Script:wght@600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy-1:#1a2138; --navy-2:#222c4a; --navy-3:#2c3860;
  --wood-1:#3a2316; --wood-2:#5a3a22;
  --gold:#e9c87a; --gold-soft:#f3d898;
  --cream:#f4efe2; --cream-dim:rgba(244,239,226,.62);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Outfit',system-ui,sans-serif;
  background:var(--navy-1); color:var(--cream);
  overflow:hidden; position:fixed; inset:0;
}
.hand{font-family:'Caveat',cursive;line-height:1.25}
.eyebrow{font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:500;opacity:.85}

/* ---------- panggung ---------- */
.stage{position:absolute;inset:0;overflow:hidden}
.stage::before{content:"";position:absolute;inset:0;
  background:radial-gradient(120% 80% at 50% -10%,var(--navy-3),var(--navy-1) 60%)}
.spotlight{position:absolute;top:-30%;width:60vmax;height:120vmax;
  background:radial-gradient(closest-side,rgba(233,200,122,.16),transparent 70%);
  filter:blur(8px);pointer-events:none}
.spotlight.l{left:-25%;transform:rotate(18deg)}
.spotlight.r{right:-25%;transform:rotate(-18deg)}
.string-lights{position:absolute;top:0;left:0;right:0;height:60px;pointer-events:none;
  background:radial-gradient(circle at 10px 30px,var(--gold) 2px,transparent 3px) repeat-x;
  background-size:46px 60px;opacity:.55;animation:twinkle 3.5s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.35}50%{opacity:.7}}
.floor{position:absolute;left:0;right:0;bottom:0;height:24%;
  background:linear-gradient(var(--wood-2),var(--wood-1));
  box-shadow:0 -10px 40px rgba(0,0,0,.5) inset;opacity:.9}

/* ---------- tirai ---------- */
.curtain-top{position:absolute;top:0;left:0;right:0;height:90px;z-index:6;
  background:linear-gradient(var(--navy-2),var(--navy-1));
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  border-bottom:3px solid var(--gold)}
.curtain-half{position:absolute;top:0;bottom:0;width:52%;z-index:5;
  background:repeating-linear-gradient(90deg,var(--navy-2) 0 26px,var(--navy-3) 26px 52px);
  box-shadow:0 0 60px rgba(0,0,0,.6) inset;
  transition:transform 1.6s cubic-bezier(.7,0,.2,1)}
.curtain-half.left{left:0;transform-origin:left}
.curtain-half.right{right:0;transform-origin:right}
.curtain-half::after{content:"";position:absolute;top:0;bottom:0;width:14px;background:var(--gold);opacity:.5}
.curtain-half.left::after{right:0}
.curtain-half.right::after{left:0}
body.open .curtain-half.left{transform:translateX(-102%)}
body.open .curtain-half.right{transform:translateX(102%)}

/* ---------- intro ---------- */
.intro-card{position:absolute;inset:0;z-index:7;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;gap:14px;padding:24px;
  transition:opacity .6s ease}
body.open .intro-card{opacity:0;pointer-events:none}
.intro-emoji{font-size:3.4rem;filter:drop-shadow(0 8px 18px rgba(0,0,0,.5))}
.intro-box{background:rgba(26,33,56,.6);backdrop-filter:blur(6px);
  border:1px solid rgba(233,200,122,.3);border-radius:22px;padding:22px 26px;max-width:330px}
.judul{font-family:'Dancing Script',cursive;font-size:clamp(2rem,9vw,2.8rem);margin-top:6px;line-height:1.15}
.judul .nama{color:var(--gold-soft)}
.small{color:var(--cream-dim);font-size:.95rem;margin-top:8px}
.btn{margin-top:6px;border:none;cursor:pointer;font-family:'Outfit';font-weight:600;
  font-size:1rem;color:#23170a;background:linear-gradient(var(--gold-soft),var(--gold));
  padding:13px 26px;border-radius:999px;box-shadow:0 10px 24px rgba(233,200,122,.3);
  transition:transform .15s ease}
.btn:active{transform:scale(.96)}
.hint{color:var(--cream-dim);font-size:.8rem;margin-top:4px}

/* ---------- adegan ---------- */
.scene-wrap{position:absolute;inset:0;z-index:4;display:flex;align-items:center;justify-content:center;padding:26px}
.scene{position:absolute;width:min(360px,90vw);display:none;flex-direction:column;
  align-items:center;text-align:center;gap:14px}
.scene.active{display:flex;animation:rise .7s ease both}
@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

.polaroid{background:#f7f3ea;padding:12px 12px 18px;border-radius:6px;
  box-shadow:0 18px 40px rgba(0,0,0,.55);transform:rotate(-2deg)}
.polaroid .pic{width:236px;height:236px;object-fit:cover;border-radius:3px;display:block;background:#dcd3c2}
.polaroid .cap{font-family:'Caveat',cursive;font-size:1.45rem;color:#3a2f22;margin-top:8px}

.lovewrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.heart-spin{width:54px;height:54px;background:var(--gold);
  -webkit-mask:radial-gradient(circle at 30% 30%,#000 28%,transparent 29%) ,radial-gradient(circle at 70% 30%,#000 28%,transparent 29%);
  position:relative;animation:beat 1.2s ease-in-out infinite}
.heart-spin::after{content:"💛";font-size:2.6rem;position:absolute;inset:0;display:grid;place-items:center}
@keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.heart-name{font-family:'Dancing Script',cursive;font-size:clamp(2.2rem,10vw,3rem);color:var(--gold-soft)}

.scene-title{font-size:clamp(2rem,8.5vw,2.6rem);color:var(--cream)}
.note{color:var(--cream);font-size:.98rem;line-height:1.55;white-space:pre-line;
  background:rgba(26,33,56,.5);border:1px solid rgba(233,200,122,.22);
  border-radius:16px;padding:16px 18px;max-width:330px}
.sign{display:block;margin-top:14px;font-size:1.6rem;color:var(--gold-soft)}

.mini-row{display:flex;gap:10px;justify-content:center}
.mini{background:#f7f3ea;padding:6px 6px 10px;border-radius:5px;box-shadow:0 10px 22px rgba(0,0,0,.5)}
.mini .pic{width:74px;height:90px;object-fit:cover;border-radius:2px;display:block;background:#dcd3c2}
.mini:nth-child(1){transform:rotate(-5deg)}
.mini:nth-child(3){transform:rotate(5deg)}

.bouquet{font-size:5.5rem;filter:drop-shadow(0 10px 24px rgba(0,0,0,.5));animation:beat 1.6s ease-in-out infinite}

.float{position:absolute;bottom:-10%;font-size:1.4rem;z-index:8;pointer-events:none;animation:floatUp linear forwards}
@keyframes floatUp{to{transform:translateY(-115vh) rotate(40deg);opacity:0}}
</style>
</head>
<body>
  <div class="stage">
    <div class="spotlight l"></div>
    <div class="spotlight r"></div>
    <div class="string-lights"></div>
    <div class="floor"></div>
  </div>

  <div class="scene-wrap" id="sceneWrap"></div>

  <div class="curtain-top"></div>
  <div class="curtain-half left"></div>
  <div class="curtain-half right"></div>

  <div class="intro-card">
    <div class="intro-emoji">🥹</div>
    <div class="intro-box">
      <div class="eyebrow">Pertunjukan Spesial</div>
      <div class="judul" id="introJudul"></div>
      <div class="small" id="introUntuk">tap tombol di bawah buat mulai cerita 🤍</div>
    </div>
    <button class="btn" id="bukaTirai">Buka tirai</button>
    <div class="hint">khusus buat kamu yang lagi baca ini</div>
  </div>

const $ = s => document.querySelector(s);
const wrap = $("#sceneWrap");

$("#introJudul").innerHTML = `${CONFIG.introJudul} <span class="nama">${CONFIG.penerima}</span>`;

// ---- bangun semua adegan ----
const scenes = [];
function addScene(html){ const d=document.createElement("div"); d.className="scene"; d.innerHTML=html; wrap.appendChild(d); scenes.push(d); }

// adegan 0: nama
addScene(`
  <div class="eyebrow">buat kamu</div>
  <div class="lovewrap">
    <div class="heart-spin"></div>
    <div class="heart-name hand">${CONFIG.penerima}</div>
  </div>
  <div class="hint">khusus buat kamu yang lagi baca ini 🤍</div>
`);

// babak-babak
CONFIG.babak.forEach((b,i)=>{
  addScene(`
    <div class="eyebrow">Babak ${i+1} / ${CONFIG.babak.length}</div>
    <div class="scene-title hand">${b.judul}</div>
    <div class="polaroid">
      <img class="pic" src="${b.foto}" style="object-position:${b.pos||'50% 50%'}" alt="">
      <div class="cap">${b.caption}</div>
    </div>
    <div class="note">${b.pesan}</div>
  `);
});

// finale
const tiga = CONFIG.babak.map(b=>`<div class="mini"><img class="pic" src="${b.foto}" style="object-position:${b.pos||'50% 50%'}"></div>`).join("");
addScene(`
  <div class="mini-row">${tiga}</div>
  <div class="eyebrow">${CONFIG.finale.eyebrow}</div>
  <div class="scene-title hand" style="font-size:clamp(2.4rem,9vw,3.2rem)">${CONFIG.finale.judul}</div>
  <div class="note">${CONFIG.finale.surat}<span class="sign hand">— ${CONFIG.pengirim}, buat ${CONFIG.penerima}</span></div>
`);

// bouquet
addScene(`
  <div class="bouquet">💐</div>
  <div class="note" style="max-width:340px">${CONFIG.bouquetPesan}</div>
`);

// ---- navigasi ----
let idx = 0;
function show(i){
  scenes.forEach((s,n)=>s.classList.toggle("active",n===i));
  if(i===scenes.length-2) burstHearts();   // finale
}
// tap di mana aja buat lanjut
wrap.addEventListener("click", ()=>{
  if(!document.body.classList.contains("open")) return;
  if(idx < scenes.length-1){ idx++; show(idx); }
});

$("#bukaTirai").addEventListener("click", ()=>{
  document.body.classList.add("open");
  setTimeout(()=>show(0), 700);
});

// ---- hati melayang ----
function burstHearts(){
  const emo=["💛","🤍","💐","✨","🤎"];
  for(let k=0;k<18;k++){
    const e=document.createElement("div");
    e.className="float"; e.textContent=emo[k%emo.length];
    e.style.left=(Math.random()*100)+"%";
    e.style.animationDuration=(3+Math.random()*3)+"s";
    e.style.animationDelay=(Math.random()*1.2)+"s";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),6500);
  }
}
</script>
</body>
</html>
