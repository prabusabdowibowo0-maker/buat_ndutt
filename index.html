<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Pertunjukan Spesial</title>

<!-- Font: Caveat (tulisan tangan) + Dancing Script (nama) + Outfit (label/tombol) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Dancing+Script:wght@600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* =====================================================================
   PALET WARNA  (semua diatur dari sini lewat CSS variables)
   ===================================================================== */
:root{
  --navy-1:#1a2138;     /* warna panggung paling gelap   */
  --navy-2:#222c4a;     /* warna tirai                   */
  --navy-3:#2c3860;     /* garis tirai yang lebih terang */
  --wood-1:#3a2316;     /* lantai kayu bawah             */
  --wood-2:#5a3a22;     /* highlight kayu                */
  --gold:#e9c87a;       /* emas lampu + tombol           */
  --gold-soft:#f3d898;
  --cream:#f4efe2;      /* teks utama                    */
  --cream-dim:rgba(244,239,226,.62);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{height:100%}
body{
  font-family:'Outfit',system-ui,sans-serif;
  background:var(--navy-1);
  color:var(--cream);
  overflow:hidden;
  position:fixed;inset:0;
}

/* font tulisan tangan dipakai berulang */
.hand{font-family:'Caveat',cursive;line-height:1.25}

/* label kecil huruf gede (PERTUNJUKAN SPESIAL / BABAK 1/3) */
.eyebrow{
  font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;
  color:var(--gold);font-weight:500;opacity:.85;
}

/* ===================================================================
   PANGGUNG  (latar belakang: dinding navy + spotlight + lampu + kayu)
   =================================================================== */
#stage{
  position:absolute;inset:0;
  background:
    radial-gradient(120% 80% at 50% -10%, #33406b 0%, var(--navy-1) 55%, #11162a 100%);
  overflow:hidden;
}
/* dua sorotan lampu dari atas */
.spotlight{
  position:absolute;top:-6%;width:60%;height:115%;
  background:linear-gradient(to bottom, rgba(255,244,214,.16), rgba(255,244,214,.04) 45%, transparent 75%);
  filter:blur(6px);pointer-events:none;
  animation:sway 9s ease-in-out infinite;
}
.spotlight.l{left:-14%;clip-path:polygon(46% 0,54% 0,96% 100%,4% 100%);transform-origin:50% 0}
.spotlight.r{right:-14%;clip-path:polygon(46% 0,54% 0,96% 100%,4% 100%);animation-delay:-4.5s}
@keyframes sway{0%,100%{transform:rotate(-2.5deg)}50%{transform:rotate(2.5deg)}}

/* lampu kelap-kelip di atas panggung */
.string-lights{
  position:absolute;top:0;left:0;right:0;height:26px;
  background:
    repeating-linear-gradient(90deg,
      transparent 0 14px,
      var(--gold) 14px 17px,
      transparent 17px 31px);
  filter:drop-shadow(0 0 6px var(--gold));
  opacity:.9;animation:twinkle 2.4s ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:.55;filter:drop-shadow(0 0 4px var(--gold))}
                   50%{opacity:1;filter:drop-shadow(0 0 10px var(--gold-soft))}}

/* lantai kayu di bagian bawah */
.floor{
  position:absolute;left:0;right:0;bottom:0;height:18%;
  background:
    linear-gradient(to bottom, var(--wood-2), var(--wood-1));
  box-shadow:0 -1px 0 rgba(233,200,122,.25), inset 0 8px 18px rgba(0,0,0,.35);
}
.floor::before{ /* garis papan kayu */
  content:"";position:absolute;inset:0;opacity:.18;
  background:repeating-linear-gradient(90deg, transparent 0 46px, rgba(0,0,0,.6) 46px 47px);
}

/* ===================================================================
   ADEGAN (scene) — cuma satu yang aktif dalam satu waktu
   =================================================================== */
.scene{
  position:absolute;inset:0;z-index:5;
  overflow-y:auto;-webkit-overflow-scrolling:touch;   /* BISA DI-SCROLL kalau konten kepanjangan */
  opacity:0;transform:translateY(18px) scale(.98);
  pointer-events:none;transition:opacity .55s ease, transform .55s ease;
}
.scene.active{opacity:1;transform:none;pointer-events:auto}
/* pembungkus isi: konten pendek ketengah, konten panjang manjang + bisa scroll */
.scene-inner{
  min-height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:48px 26px 16%;gap:18px;
}

/* ---- HATI MUTER dari tulisan "i love you" ---- */
.lovewrap{position:relative;width:min(80vw,300px);aspect-ratio:1;margin:4px auto}
.heart-spin{position:absolute;inset:0;animation:spin 22s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ilu{
  position:absolute;transform:translate(-50%,-50%);
  font-size:9px;letter-spacing:.4px;color:#bcd4ff;white-space:nowrap;
  text-shadow:0 0 6px rgba(120,170,255,.9), 0 0 12px rgba(120,170,255,.45);
  animation:twk 2.6s ease-in-out infinite;
}
@keyframes twk{0%,100%{opacity:.4}50%{opacity:1}}
.heart-name{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Dancing Script',cursive;font-size:clamp(1.8rem,8vw,2.7rem);
  color:#eaf2ff;text-shadow:0 0 14px rgba(150,190,255,.85);pointer-events:none;
}

/* polaroid foto */
.polaroid{
  background:#fbf7ee;padding:12px 12px 46px;border-radius:4px;
  box-shadow:0 18px 38px rgba(0,0,0,.5);
  transform:rotate(-3deg);max-width:240px;width:62vw;
  animation:drop .7s cubic-bezier(.2,.9,.25,1.1) both;
}
.polaroid .pic{
  width:100%;aspect-ratio:3/4;border-radius:2px;object-fit:cover;display:block;
  background:
    radial-gradient(110% 90% at 30% 20%, #4a5680, #2b3354 60%, #1d2440);
}
.polaroid .cap{
  font-family:'Caveat',cursive;font-size:1.15rem;color:#5b6480;
  text-align:center;margin-top:10px;position:absolute;left:0;right:0;bottom:12px;
}
.polaroid.empty .pic{display:flex;align-items:center;justify-content:center}
.polaroid.empty .pic::after{
  content:"foto kamu\00a0🤍";font-family:'Caveat',cursive;font-size:1.2rem;
  color:rgba(255,255,255,.55);
}
@keyframes drop{0%{opacity:0;transform:translateY(-40px) rotate(6deg)}
                100%{opacity:1;transform:translateY(0) rotate(-3deg)}}

/* judul tulisan tangan tiap babak */
.scene-title{
  font-family:'Caveat',cursive;font-weight:700;
  font-size:clamp(1.9rem,7vw,2.6rem);line-height:1.1;max-width:11ch;
}

/* kotak pesan */
.note{
  background:linear-gradient(180deg, rgba(10,14,28,.78), rgba(10,14,28,.55));
  border:1px solid rgba(233,200,122,.28);border-radius:16px;
  padding:18px 22px;max-width:420px;width:100%;
  font-family:'Caveat',cursive;font-size:1.4rem;line-height:1.5;color:#f0ead9;
  box-shadow:0 10px 30px rgba(0,0,0,.4), inset 0 0 30px rgba(233,200,122,.05);
  white-space:pre-line;
}
.note .sign{display:block;margin-top:14px;color:var(--gold-soft);font-size:1.25rem}

/* tombol */
.btn{
  font-family:'Outfit',sans-serif;font-weight:600;font-size:.98rem;
  border:none;border-radius:999px;padding:13px 30px;cursor:pointer;
  background:linear-gradient(180deg, var(--gold-soft), var(--gold));
  color:#3a2c10;box-shadow:0 8px 22px rgba(233,200,122,.35);
  transition:transform .15s ease, box-shadow .15s ease;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(233,200,122,.5)}
.btn:active{transform:translateY(0)}
.btn:focus-visible{outline:3px solid var(--cream);outline-offset:3px}

.link{
  background:none;border:none;color:var(--cream-dim);cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:.85rem;text-decoration:underline;
  text-underline-offset:4px;padding:6px;
}
.link:hover{color:var(--cream)}

/* tiga polaroid mini di finale */
.mini-row{display:flex;gap:-10px;justify-content:center;margin-bottom:4px}
.mini{
  width:64px;background:#fbf7ee;padding:5px 5px 14px;border-radius:3px;
  box-shadow:0 8px 18px rgba(0,0,0,.45);
}
.mini:nth-child(1){transform:rotate(-9deg)}
.mini:nth-child(2){transform:rotate(0) translateY(-6px);z-index:2}
.mini:nth-child(3){transform:rotate(9deg)}
.mini .pic{width:100%;aspect-ratio:3/4;border-radius:2px;object-fit:cover;
  background:radial-gradient(110% 90% at 30% 20%, #4a5680, #2b3354 60%, #1d2440)}

/* ===================================================================
   TIRAI  (overlay penutup di awal)
   =================================================================== */
#curtain{position:absolute;inset:0;z-index:20}
#curtain.open{pointer-events:none}   /* PENTING: pas kebuka, jangan ngeblok klik tombol di bawahnya */
.curtain-half{
  position:absolute;top:0;bottom:0;width:51%;
  background:
    linear-gradient(90deg, rgba(0,0,0,.35), transparent 12%, transparent 88%, rgba(0,0,0,.45)),
    repeating-linear-gradient(90deg, var(--navy-2) 0 11px, var(--navy-3) 11px 13px, var(--navy-2) 13px 30px);
  transition:transform 1.3s cubic-bezier(.7,0,.2,1);
  box-shadow:inset 0 0 80px rgba(0,0,0,.5);
}
.curtain-half.left{left:0}
.curtain-half.right{right:0}
/* strip emas di atas tirai */
.curtain-top{
  position:absolute;top:0;left:0;right:0;height:18px;z-index:21;
  background:repeating-linear-gradient(90deg, transparent 0 12px, var(--gold) 12px 16px, transparent 16px 28px);
  filter:drop-shadow(0 0 6px var(--gold));
}
#curtain.open .left{transform:translateX(-102%)}
#curtain.open .right{transform:translateX(102%)}
#curtain.open .curtain-top{opacity:0;transition:opacity .5s}

/* kartu intro di atas tirai */
.intro-card{
  position:absolute;z-index:22;left:50%;top:50%;transform:translate(-50%,-50%);
  width:min(86vw,360px);text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:18px;
  transition:opacity .6s ease;
}
#curtain.open .intro-card{opacity:0;pointer-events:none}
.intro-emoji{font-size:2.6rem;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4))}
.intro-box{
  background:linear-gradient(180deg, rgba(8,11,22,.85), rgba(8,11,22,.6));
  border:1px solid rgba(233,200,122,.3);border-radius:18px;padding:24px 26px;
  box-shadow:0 14px 40px rgba(0,0,0,.5);width:100%;
}
.intro-box .judul{
  font-family:'Caveat',cursive;font-weight:700;font-size:2rem;line-height:1.15;margin:6px 0 2px;
}
.intro-box .nama{font-family:'Dancing Script',cursive;color:var(--gold-soft)}
.intro-box .small{color:var(--cream-dim);font-size:.82rem;margin-top:4px}
.hint{color:var(--cream-dim);font-size:.8rem}

/* ===================================================================
   KELOPAK BUNGA JATUH
   =================================================================== */
.petal{
  position:absolute;top:-6%;z-index:8;pointer-events:none;
  width:12px;height:12px;border-radius:80% 0 80% 0;
  background:linear-gradient(135deg,#f7e7d0,#e9c87a);opacity:.85;
  animation:fall linear forwards;
}
@keyframes fall{
  0%{transform:translateY(0) rotate(0);opacity:0}
  10%{opacity:.85}
  100%{transform:translateY(108vh) rotate(540deg);opacity:0}
}

/* ===================================================================
   ANIMASI LOVE-LOVE  (hati melayang naik selama pertunjukan)
   =================================================================== */
.love-heart{
  position:absolute;bottom:16%;z-index:6;pointer-events:none;
  opacity:0;will-change:transform;
  animation:floatUp linear forwards;
}
@keyframes floatUp{
  0%{transform:translateY(0) translateX(0) scale(.5);opacity:0}
  12%{opacity:.9}
  50%{transform:translateY(-45vh) translateX(18px) scale(1)}
  100%{transform:translateY(-92vh) translateX(-14px) scale(1.05);opacity:0}
}

/* ===================================================================
   BOUQUET (adegan penutup)
   =================================================================== */
.bouquet{font-size:5.5rem;filter:drop-shadow(0 10px 24px rgba(0,0,0,.5));
  animation:pop .8s cubic-bezier(.2,.9,.3,1.3) both}
@keyframes pop{0%{transform:scale(.2) rotate(-12deg);opacity:0}100%{transform:none;opacity:1}}
.float-heart{position:absolute;z-index:7;font-size:1.4rem;animation:rise 3.2s ease-in forwards;opacity:0}
@keyframes rise{0%{transform:translateY(0) scale(.6);opacity:0}
                15%{opacity:.9}100%{transform:translateY(-60vh) scale(1.1);opacity:0}}

/* aksesibilitas: hormati pengguna yang matiin animasi */
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:opacity .2s linear!important}
  .curtain-half{transition:transform .4s ease!important}
}
</style>
</head>
<body>

<!-- ========================= PANGGUNG ========================= -->
<div id="stage">
  <div class="spotlight l"></div>
  <div class="spotlight r"></div>
  <div class="string-lights"></div>
  <div class="floor"></div>
  <div id="scenes"></div>   <!-- adegan diisi otomatis lewat JS -->
</div>

<!-- ========================= TIRAI ========================= -->
<div id="curtain">
  <div class="curtain-top"></div>
  <div class="curtain-half left"></div>
  <div class="curtain-half right"></div>
  <div class="intro-card">
    <div class="intro-emoji">🥹</div>
    <div class="intro-box">
      <div class="eyebrow">Pertunjukan Spesial</div>
      <div class="judul" id="introJudul"></div>
      <div class="small" id="introUntuk"></div>
    </div>
    <button class="btn" id="bukaTirai">Buka tirai</button>
    <div class="hint">tap tirainya buat mulai cerita</div>
  </div>
</div>

/* =====================================================================
   ⬆️  BERHENTI EDIT DI SINI  ⬆️   (di bawah ini mesinnya)
   ===================================================================== */

const $ = (s,el=document)=>el.querySelector(s);
const scenesEl = $("#scenes");
let idx = 0;        // adegan aktif (0..n babak, lalu finale, lalu bouquet)
let scenes = [];    // kumpulan elemen adegan

// helper bikin elemen
function el(tag, cls, html){
  const e=document.createElement(tag);
  if(cls) e.className=cls;
  if(html!=null) e.innerHTML=html;
  return e;
}
function polaroidHTML(foto, caption){
  const isEmpty = !foto;
  const pic = foto ? `<img class="pic" src="${foto}" alt="">` : `<div class="pic"></div>`;
  const cap = caption ? `<div class="cap">${caption}</div>` : "";
  return `<div class="polaroid ${isEmpty?'empty':''}">${pic}${cap}</div>`;
}

/* ---- bikin cangkang scene + pembungkus (biar bisa scroll) ---- */
function makeScene(kind){
  const s = el("div","scene"); s.dataset.kind = kind;
  const inner = el("div","scene-inner");
  s.appendChild(inner);
  scenesEl.appendChild(s); scenes.push(s);
  return inner;            // konten ditaro di sini
}

/* ---- susun spans "i love you" jadi bentuk hati ---- */
function buildHeart(box){
  const N = 60, s = 2.45;
  for(let k=0;k<N;k++){
    const t = (k/N)*Math.PI*2;
    const x = 16*Math.pow(Math.sin(t),3);
    const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
    const sp = el("span","ilu","i love you");
    sp.style.left = (50 + x*s) + "%";
    sp.style.top  = (50 - y*s + 4) + "%";
    sp.style.opacity = (0.45 + Math.random()*0.55).toFixed(2);
    sp.style.animationDelay = (Math.random()*2.4).toFixed(2)+"s";
    box.appendChild(sp);
  }
}

/* ---- bangun semua adegan dari CONFIG ---- */
function buildScenes(){
  scenesEl.innerHTML=""; scenes=[];
  const total = CONFIG.babak.length;

  // SCENE 0 — hati muter "i love you" (yang muncul pas dia buka linknya)
  const hi = makeScene("heart");
  hi.innerHTML = `
    <div class="eyebrow">buat kamu</div>
    <div class="lovewrap">
      <div class="heart-spin"></div>
      <div class="heart-name hand">${CONFIG.penerima}</div>
    </div>
    <div class="hint" style="margin-top:8px">khusus buat kamu yang lagi baca ini 🤍</div>
  `;
  buildHeart(hi.querySelector(".heart-spin"));
  const hiBtn = el("button","btn","Mulai cerita"); hiBtn.onclick = next;
  hi.appendChild(hiBtn);

  // babak-babak
  CONFIG.babak.forEach((b,i)=>{
    const inner = makeScene("babak");
    inner.innerHTML = `
      <div class="eyebrow">Babak ${i+1} / ${total}</div>
      <div class="scene-title hand">${b.judul}</div>
      ${polaroidHTML(b.foto,b.caption)}
      <div class="note">${b.pesan}</div>
    `;
    const btn = el("button","btn","Lanjut cerita"); btn.onclick = next;
    inner.appendChild(btn);
  });

  // finale
  const fi = makeScene("finale");
  const fotoTiga = CONFIG.babak.slice(0,3).map(b=>
     `<div class="mini">${b.foto?`<img class="pic" src="${b.foto}">`:`<div class="pic"></div>`}</div>`
  ).join("");
  fi.innerHTML = `
    <div class="mini-row">${fotoTiga}</div>
    <div class="eyebrow">${CONFIG.finale.eyebrow}</div>
    <div class="scene-title hand" style="font-size:clamp(2.4rem,9vw,3.2rem)">${CONFIG.finale.judul}</div>
    <div class="note">${CONFIG.finale.surat}<span class="sign hand">— ${CONFIG.pengirim}, buat ${CONFIG.penerima}</span></div>
  `;
  const fBtn = el("button","btn","Lihat bouquet"); fBtn.onclick = next;
  const fLink = el("button","link","Ulang dari awal"); fLink.onclick = restart;
  fi.appendChild(fBtn); fi.appendChild(fLink);

  // bouquet (penutup)
  const bi = makeScene("bouquet");
  bi.innerHTML = `
    <div class="bouquet">💐</div>
    <div class="note" style="max-width:340px">${CONFIG.bouquetPesan}</div>
  `;
  const bqLink = el("button","link","Ulang dari awal"); bqLink.onclick = restart;
  bi.appendChild(bqLink);
}

/* ---- navigasi antar adegan ---- */
function show(i){
  scenes.forEach((s,n)=>s.classList.toggle("active", n===i));
  idx=i;
  const s=scenes[i];
  if(s) s.scrollTop=0;                       // tiap pindah scene, balik ke atas
  const kind = s ? s.dataset.kind : "";
  if(kind==="finale")  startPetals();
  if(kind==="bouquet") burstHearts();
}
function next(){ if(idx<scenes.length-1) show(idx+1); }
function restart(){
  stopPetals();
  stopLove();
  $("#curtain").classList.remove("open");
  scenes.forEach(s=>s.classList.remove("active"));
  idx=0;
}

/* ---- buka tirai ---- */
$("#bukaTirai").onclick = ()=>{
  $("#curtain").classList.add("open");
  startLove();                   // mulai animasi love-love
  setTimeout(()=>show(0), 700);  // tampilkan babak 1 pas tirai mulai kebuka
};

/* ---- kelopak bunga jatuh ---- */
let petalTimer=null;
function startPetals(){
  if(petalTimer) return;
  petalTimer=setInterval(()=>{
    const p=el("div","petal");
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(4+Math.random()*4)+"s";
    p.style.transform=`scale(${.6+Math.random()})`;
    document.getElementById("stage").appendChild(p);
    setTimeout(()=>p.remove(),9000);
  },420);
}
function stopPetals(){ clearInterval(petalTimer); petalTimer=null;
  document.querySelectorAll(".petal").forEach(p=>p.remove()); }

/* ---- animasi love-love (hati melayang) ---- */
let loveTimer=null;
function startLove(){
  if(loveTimer) return;
  const set=["❤️","🤍","💛","💕","💖"];
  loveTimer=setInterval(()=>{
    const h=el("div","love-heart",set[Math.floor(Math.random()*set.length)]);
    h.style.left=(Math.random()*100)+"vw";
    h.style.fontSize=(14+Math.random()*16)+"px";
    h.style.animationDuration=(5+Math.random()*4)+"s";
    document.getElementById("stage").appendChild(h);
    setTimeout(()=>h.remove(),9000);
  }, 750);
}
function stopLove(){ clearInterval(loveTimer); loveTimer=null;
  document.querySelectorAll(".love-heart").forEach(h=>h.remove()); }

/* ---- hati melayang pas bouquet ---- */
function burstHearts(){
  const hearts=["💛","🤍","💐","✨"];
  for(let i=0;i<14;i++){
    setTimeout(()=>{
      const h=el("div","float-heart",hearts[i%hearts.length]);
      h.style.left=(20+Math.random()*60)+"vw";
      h.style.bottom="20%";
      document.getElementById("stage").appendChild(h);
      setTimeout(()=>h.remove(),3300);
    }, i*120);
  }
}

/* ---- isi teks intro + bangun adegan ---- */
$("#introJudul").innerHTML = `${CONFIG.introJudul} <span class="nama">${CONFIG.penerima}</span>`;
$("#introUntuk").textContent = `untuk ${CONFIG.penerima}`;
buildScenes();
</script>
